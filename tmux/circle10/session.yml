# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
# pre_window: export RUN_TYPE=simulation; export UAV_TYPE=x500; export BOND=false; export CUSTOM_CONFIG=./config/custom_config.yaml; export WORLD_CONFIG=./config/world_config.yaml; export NETWORK_CONFIG=./config/network_config.yaml; export PLATFORM_CONFIG=`rospack find mrs_multirotor_simulator`/config/mrs_uav_system/$UAV_TYPE.yaml

pre_window: export UAV_NAME=uav1; export RUN_TYPE=simulation; export UAV_TYPE=x500; export BOND=false; export CUSTOM_CONFIG=./config/custom_config.yaml; export WORLD_CONFIG=./config/world_config.yaml; export NETWORK_CONFIG=./config/network_config.yaml; export PLATFORM_CONFIG=`rospack find mrs_multirotor_simulator`/config/mrs_uav_system/$UAV_TYPE.yaml; export MAP_LENGTH=20.0; export MAP_WIDTH=20.0; export MAP_HEIGHT=10.0; export MAP_OBS_NUM=1; export MAP_CIRCLE_NUM=0

startup_window: activation

windows:
  - roscore:
      layout: tiled
      panes:
        - roscore
  - core:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav2; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav3; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav4; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav5; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav6; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav7; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav8; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav9; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav10; waitForTime; roslaunch mrs_uav_core core.launch
  - simulator:
      layout: tiled
      panes:
        - waitForRos; roslaunch mrs_multirotor_simulator multirotor_simulator.launch custom_config:=./config/simulator.yaml
  - hw_api:
      layout: tiled
      panes:
        - waitForTime; export UAV_NAME=uav1; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav2; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav3; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav4; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav5; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav6; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav7; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav8; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav9; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav10; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
  - activation:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav2; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav3; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav4; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav5; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav6; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav7; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav8; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav9; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav10; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
  - rbl_controller:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav2; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav3; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav4; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav5; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav6; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav7; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav8; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav9; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav10; waitForTakeoff; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
  - goto_end:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s rosservice call /uav1/rbl_controller/goto \"goal: \[-15.00, 0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav2/rbl_controller/goto \"goal: \[-12.14, -8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav3/rbl_controller/goto \"goal: \[-4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav4/rbl_controller/goto \"goal: \[4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav5/rbl_controller/goto \"goal: \[12.14, -8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav6/rbl_controller/goto \"goal: \[15.00, -0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav7/rbl_controller/goto \"goal: \[12.14, 8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav8/rbl_controller/goto \"goal: \[4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav9/rbl_controller/goto \"goal: \[-4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav10/rbl_controller/goto \"goal: \[-12.14, 8.82, 5.00, 0.0\]\"'

  - goto_start:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s rosservice call /uav1/rbl_controller/goto \"goal: \[15.00, 0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav2/rbl_controller/goto \"goal: \[12.14, 8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav3/rbl_controller/goto \"goal: \[4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav4/rbl_controller/goto \"goal: \[-4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav5/rbl_controller/goto \"goal: \[-12.14, 8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav6/rbl_controller/goto \"goal: \[-15.00, 0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav7/rbl_controller/goto \"goal: \[-12.14, -8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav8/rbl_controller/goto \"goal: \[-4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav9/rbl_controller/goto \"goal: \[4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav10/rbl_controller/goto \"goal: \[12.14, -8.82, 5.00, 0.0\]\"'
  - automatic_start:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav2; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav3; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav4; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav5; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav6; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav7; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav8; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav9; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav10; waitForTime; roslaunch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml
  - takeoff:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav2; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav3; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav4; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav5; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav6; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav7; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav8; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav9; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
        - export UAV_NAME=uav10; waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard; exit
  - tf_connector:
      layout: tiled
      panes:
        - waitForTime; roslaunch mrs_tf_connector tf_connector.launch custom_config:=./config/tf_connector.yaml
  - rviz:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForControl; rosrun rviz rviz -d ./rviz.rviz
  # - layout:
  #     layout: tiled
  #     panes:
  #       - waitForControl; sleep 5; ~/.i3/layout_manager.sh ./layout.json
  #

  - rosbag:
      layout: tiled
      panes:
        - export UAV_NAMl=uav1; rosparam set use_sim_time true;waitForControl; sleep 5; ./record_rbl.sh ${SIM_ID} 

  - goal_monitoring:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForControl; sleep 5; rosrun rbl_controller monitor_goal.py _goals_file:=/home/manuel/nmpc_workspace/src/rbl_controller/tmux/circle10/config/rbl_controller.yaml
  - goto_end:
      layout: tiled
      synchronize: after
      panes:
        - "export UAV_NAME=uav1; waitForTakeoff; sleep 15; rosservice call /uav1/rbl_controller/goto 'goal: [-15.00, 0.00, 5.00, 0.0]'"
        - "export UAV_NAME=uav2; waitForTakeoff; sleep 15; rosservice call /uav2/rbl_controller/goto 'goal: [-12.14, -8.82, 5.00, 0.0]'"
        - "export UAV_NAME=uav3; waitForTakeoff; sleep 15; rosservice call /uav3/rbl_controller/goto 'goal: [-4.64, -14.27, 5.00, 0.0]'"
        - "export UAV_NAME=uav4; waitForTakeoff; sleep 15; rosservice call /uav4/rbl_controller/goto 'goal: [4.64, -14.27, 5.00, 0.0]'"
        - "export UAV_NAME=uav5; waitForTakeoff; sleep 15; rosservice call /uav5/rbl_controller/goto 'goal: [12.14, -8.82, 5.00, 0.0]'"
        - "export UAV_NAME=uav6; waitForTakeoff; sleep 15; rosservice call /uav6/rbl_controller/goto 'goal: [15.00, 0.00, 5.00, 0.0]'"
        - "export UAV_NAME=uav7; waitForTakeoff; sleep 15; rosservice call /uav7/rbl_controller/goto 'goal: [12.14, 8.82, 5.00, 0.0]'"
        - "export UAV_NAME=uav8; waitForTakeoff; sleep 15; rosservice call /uav8/rbl_controller/goto 'goal: [4.64, 14.27, 5.00, 0.0]'"
        - "export UAV_NAME=uav9; waitForTakeoff; sleep 15; rosservice call /uav9/rbl_controller/goto 'goal: [-4.64, 14.27, 5.00, 0.0]'"
        - "export UAV_NAME=uav10; waitForTakeoff; sleep 15; rosservice call /uav10/rbl_controller/goto 'goal: [-12.14, 8.82, 5.00, 0.0]'"
  # - activation_auto:
  #     layout: tiled
  #     synchronize: after
  #     panes:
  #       - export UAV_NAME=uav1; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav2; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav3; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav4; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav5; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav6; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav7; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav8; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav9; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate
  #       - export UAV_NAME=uav10; sleep 60;  rosservice call /$UAV_NAME/rbl_controller/activate

  - map_generator:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForRos; roslaunch map_generator map_generator.launch map_frame:=map map_size_x:=$MAP_LENGTH map_size_y:=$MAP_WIDTH map_size_z:=$MAP_HEIGHT map_obs_num:=$MAP_OBS_NUM map_circle_num:=$MAP_CIRCLE_NUM


