mrs_uav_managers:

  estimation_manager:

    # loaded state estimator plugins
    state_estimators: [
      # "gps_garmin",
      "gps_baro",
    ]

  # control_manager:

  #   # list of names of dynamically loaded trackers
  #   trackers : "MpcController"
   

  #   # list of names of dynamically loaded controllers
  #   controllers :  "MpcController"
    
    initial_state_estimator: "gps_baro" # will be used as the first state estimator
    agl_height_estimator: "" # only slightly filtered height for checking min height (not used in control feedback)

  uav_manager:

    takeoff:

      rate: 10 # [Hz]

      during_takeoff:
        controller: "MpcController"
        tracker: "LandoffTracker"

      after_takeoff:
        controller: "Se3Controller"
        tracker: "MpcTracker"

      takeoff_height: 5
  constraint_manager:

    constraints: [
      "slow",
      "medium",
      "fast",
      "custom",
    ]
    allowed_constraints:
      gps_baro: ["slow", "medium", "fast", "custom"]


    custom:

      horizontal:
        speed: 8.0        # [m/s]
        acceleration: 8.0 # [m/s^2]
        jerk: 80.0        # [m/s^3]
        snap: 80.0        # [m/s^4]

      vertical:

        ascending:
          speed: 4.0        # [m/s]
          acceleration: 8.0 # [m/s^2]
          jerk: 60.0        # [m/s^3]
          snap: 60.0        # [m/s^4]

        descending:
          speed: 4.0        # [m/s]
          acceleration: 8.0 # [m/s^2]
          jerk: 60.0        # [m/s^3]
          snap: 60.0        # [m/s^4]

      heading:
        speed: 2.0        # [rad/s]
        acceleration: 2.0 # [rad/s^2]
        jerk: 40.0        # [rad/s^3]
        snap: 40.0        # [rad/s^4]

      angular_speed:
        roll: 120.0  # [rad/s]
        pitch: 120.0 # [rad/s]
        yaw: 10.0   # [rad/s]

      tilt: 60.0 # [deg]

    default_constraints:
      gps_baro: "fast"

  # gain_manager:

  #   soft:

  #     horizontal:
  #       kp: 6.0
  #       kv: 3.0
  #       ka: 2.0

  #       kib: 0.1
