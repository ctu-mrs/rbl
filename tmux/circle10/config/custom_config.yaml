mrs_uav_managers:

  estimation_manager:

    # loaded state estimator plugins
    state_estimators: [
      "gps_baro",
      # "gps_garmin",
    ]

    initial_state_estimator: "gps_baro" # will be used as the first state estimator
    agl_height_estimator: "" # only slightly filtered height for checking min height (not used in control feedback)


  takeoff:

    rate: 10 # [Hz]

    during_takeoff:
      controller: "MpcController"
      tracker: "LandoffTracker"

    after_takeoff:
      controller: "MpcController"
      tracker: "MpcTracker"

    takeoff_height: 5
  uav_manager:

    min_height_checking:
      enabled: false

    max_height_checking:
      enabled: false

  constraint_manager:

    default_constraints:
      gps_baro: "fast"

  control_manager:

    Se3Controller:
      eland_threshold: 4.0 # [m], position error triggering eland
      failsafe_threshold: 6.0 # [m], position error triggering failsafe land
      odometry_innovation_threshold: 1.5 # [m], position odometry innovation threshold

mrs_uav_trackers:

  mpc_tracker:

    # mrs collision avoidance
    collision_avoidance:

      enabled:           false # disabling this will stop this UAV to react to others, but it will still transmit data to others
      enabled_passively: false # disabling this will stop this uav to even transmit its data to others (only if enabled: false)
      radius: 3.0 # [m]
      correction: 3.0 # [m]

mrs_uav_trajectory_generation:

  # execution time limiter
  max_time: 0.5 # [s]

  # check and fix the max deviation between the input path and the output trajectory
  # by subsampling the original path with more waypoints
  check_trajectory_deviation:
    max_deviation: 0.10 # [m]

  # allows to neglect waypoints in the original path if the new path
  # does not violate max distance from the original path.
  # This makes for similar but sparser paths, which are easier for the
  # trajectory generator to work with.
  path_straightener:
    enabled: true
    max_deviation: 0.10 # [m]




