# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
startup_window: activation
pre_window: 
  - export UAV_NAME=uav1
  - export USE_SIM_TIME="true"
  - export RUN_TYPE=simulation 
  - export UAV_TYPE=x500
  - export CUSTOM_CONFIG=./config/custom_config.yaml 
  - export WORLD_CONFIG=./config/world_config.yaml 
  - export WORLD_FILE=`ros2 pkg prefix mrs_gazebo_common_resources`/share/mrs_gazebo_common_resources/worlds/pine_forest.sdf
  # - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  - export PLATFORM_CONFIG=`ros2 pkg prefix mrs_uav_gazebo_simulator`/share/mrs_uav_gazebo_simulator/config/mrs_uav_system/$UAV_TYPE.yaml
windows:
  - router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - core:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_core core.launch.py
          platform_config:=$PLATFORM_CONFIG
          custom_config:=./config/custom_config.yaml
          world_config:=./config/world_config.yaml
          network_config:=./config/network_config.yaml
  - status:
      layout: tiled
      panes:
        - ros2 run mrs_uav_status status.sh
  - activation:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; waitForOffboard; history -s ros2 service call /uav1/rbl_controller/activation std_srvs/srv/Trigger
  - rbl_controller:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTakeoff; ros2 launch rbl_controller_node rbl_controller.launch.py custom_config:=./config/rbl_controller.yaml
  - goto:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s ros2 service call /uav1/rbl_controller/goto mrs_msgs/srv/Vec4 "{goal: [2.0, 60.0, 2.0, 0.0]}"'
  - filter_reflective_uavs:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; ros2 launch filter_reflective_uavs filter_reflective_uavs.launch.py uav_name:=$UAV_NAME global_frame:=$UAV_NAME/world_origin


  - gazebo:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_gazebo_simulator simulation.launch.py gz_headless:=true gz_verbose:=true world_file:=$WORLD_FILE
        - |
          waitForGazebo; sleep 5; ros2 service call /mrs_drone_spawner/spawn mrs_msgs/srv/String "{value: '1 --$UAV_TYPE --enable-rangefinder --enable-ouster model:=OS0-64 use_gpu:=True horizontal_samples:=128 update_rate:=10 --pos 0 0 0.3 0'}"
        - ros2 launch mrs_uav_px4_api api.launch.py
  - map_plan:
      layout: tiled
      panes:
        - ros2 launch mrs_octomap_mapping_planning mapplan.launch.py custom_config:=./config/mapplan_config.yaml lidar_3d_0:=filter_reflective_uavs/filtered_pcl
        # - 'history -s ./goto.py'
  
  - takeoff:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_autostart automatic_start.launch.py custom_config:=./config/automatic_start.yaml
        - waitForCore; sleep 10; ./takeoff.sh
  - rviz:
      layout: tiled
      panes:
        - ros2 run rviz2 rviz2 -d ./rviz.rviz --ros-args -p use_sim_time:=true
  - layout:
      layout: tiled
      panes:
        - sleep 5; ~/.i3/layout_manager.sh ./layout.json
