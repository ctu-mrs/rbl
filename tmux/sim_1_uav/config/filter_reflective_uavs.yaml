filter_reflective_uavs:
  ros_parameters:
    min_intensity: 200.0
    max_intensity: 255.0
    search_radius: 0.7
    max_distance_from_seed: 0.7
    max_removed_points: 200
    ouster: true 
    time_keep: 0.2
    load_gt_uav_positions: false
    keep_cloud_dt: 0.01

    filter_out_myself: 
      enabled: true
      dist: 1.0

    reflective_clusters:
      tolerance: 0.4
      min_points: 1
      max_points: 999999

    voxel_grid:
      use: true
      size_x: 0.04
      size_y: 0.04
      size_z: 0.04

    multi_uav_tracker:
      dt: 0.1
      max_no_update: 1.0
      gate_treshold: 0.5

detected_uav_names: [uav1, uav2]
