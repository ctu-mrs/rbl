simulation_rate: 100.0
clock_rate: 100.0
realtime_factor: 0.8 

iterate_without_input: true

individual_takeoff_platform:
  enabled: false

collisions:
  enabled: true
  crash: false

  # if crash==false, then the collisions are elastic
  rebounce: 0.0

# randomization of the initial conditions around the desired spawn point
randomization:

  enabled: false

  bounds:
    x: 15.0
    y: 15.0
    z: 15.0

ground:
  enabled: true
  z: 0.0 # [m]
#


uav_names: [
  "uav1",
  "uav2",
  "uav3",
  "uav4",
  "uav5",  
]


uav1:
  type: "x500"
  spawn:
    x: 15.00
    y: 0.00
    z: 5.00
    heading: -3.14

uav2:
  type: "x500"
  spawn:
    x: 12.14
    y: 8.82
    z: 5.00
    heading: -3.77

uav3:
  type: "x500"
  spawn:
    x: 4.64
    y: 14.27
    z: 5.00
    heading: -4.40

uav4:
  type: "x500"
  spawn:
    x: -4.64
    y: 14.27
    z: 5.00
    heading: -5.03

uav5:
