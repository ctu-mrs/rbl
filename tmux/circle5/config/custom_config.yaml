mrs_uav_managers:

  estimation_manager:

    # loaded state estimator plugins
    state_estimators: [
      "gps_baro",
      # "rtk",
    ]

    initial_state_estimator: "gps_baro" # will be used as the first state estimator
    agl_height_estimator: "" # only slightly filtered height for checking min height (not used in control feedback)


  constraint_manager:

    superfast:

      horizontal:
        speed: 2.0        # [m/s]
        acceleration: 40.0 # [m/s^2]
        jerk: 600.0        # [m/s^3]
        snap: 600.0        # [m/s^4]

      vertical:

        ascending:
          speed: 2.0        # [m/s]
          acceleration: 20.0 # [m/s^2]
          jerk: 600.0        # [m/s^3]
          snap: 600.0        # [m/s^4]

        descending:
          speed: 2.0        # [m/s]
          acceleration: 20.0 # [m/s^2]
          jerk: 600.0        # [m/s^3]
          snap: 600.0        # [m/s^4]

      heading:
        speed: 2.0        # [rad/s]
        acceleration: 2.0 # [rad/s^2]
        jerk: 400.0        # [rad/s^3]
        snap: 400.0        # [rad/s^4]

      angular_speed:
        roll: 60.0  # [rad/s]
        pitch: 60.0 # [rad/s]
        yaw: 10.0   # [rad/s]

      tilt: 60.0 # [deg]

  control_manager:

    safety:

      tilt_limit:

        eland:
          enabled: false

        disarm:
          enabled: false

      tilt_error_disarm:
        enabled: false

      yaw_error_eland:
        enabled: false

    # ExampleTracker:
    #   address: "example_tracker_plugin/ExampleTracker"
    #   namespace: "example_tracker"
    #   human_switchable: true

    # # list of names of dynamically loaded trackers
    trackers : [
      "LineTracker",
    ]

    NmpcController:
      address: "controller_module/ControllerModule"
      namespace: "controller_module"
      eland_threshold: 0.0 # [m], position error triggering eland
      failsafe_threshold: 0.0 # [m], position error triggering failsafe land
      odometry_innovation_threshold: 0 # [m], position odometry innovation threshold
      human_switchable: true

      # which outputs the controller can provide
      outputs:
        actuators:             false
        control_group:         false
        attitude_rate:         true
        attitude:              true
        acceleration_hdg_rate: true
        acceleration_hdg:      true
        velocity_hdg_rate:     true 
        velocity_hdg:          true
        position:              true

    # list of names of dynamically loaded controllers
    controllers : [
      "NmpcController",
    ]


  uav_manager:

    takeoff:

      rate: 10 # [Hz]

      during_takeoff:
        controller: "MpcController"
        tracker: "LandoffTracker"

      after_takeoff:
        controller: "MpcController"
        tracker: "MpcTracker"

      takeoff_height: 5

    min_height_checking:
      enabled: false

    max_height_checking:
      enabled: false




    estimator_types: [
      "gps_baro",
      "other",
      "ground_truth",
      "passthrough",
    ]

    constraints: [
      "slow",
      "medium",
      "fast",
      "superfast",
    ]

    # list of allowed constraints per odometry mode
    allowed_constraints:
      gps_garmin: ["slow", "medium", "fast", "superfast"]
      gps_baro: ["slow", "medium", "fast", "superfast"]
      rtk: ["slow", "medium", "fast"]
      rtk_garmin: ["slow", "medium", "fast"]
      other: ["slow"]
      ground_truth: ["slow", "medium", "fast", "superfast"]
      passthrough: ["slow", "medium", "fast", "superfast"]

    # those constraints will be used automatically when a localization mode switches
    # and the current constraints are not in the allowed list (next paragraphs)
    default_constraints:
      gps_garmin: "medium"
      gps_baro: "superfast"
      other: "slow"
      ground_truth: "superfast"
      passthrough: "medium"

mrs_uav_trackers:

  line_tracker:

    tracker_loop_rate: 100 # [Hz]

    horizontal_tracker:
      horizontal_speed: 3.0
      horizontal_acceleration: 1.0

    vertical_tracker:
      vertical_speed: 1.0
      vertical_acceleration: 1.0

    heading_tracker:
      heading_gain: 1.0
      heading_rate: 0.5

  mpc_tracker:
    # mrs collision avoidance
    collision_avoidance:

      enabled:           false # disabling this will stop this UAV to react to others, but it will still transmit data to others
      enabled_passively: false # disabling this will stop this uav to even transmit its data to others (only if enabled: false)

