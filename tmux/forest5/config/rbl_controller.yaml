group_odoms:
  enable: true
  add_to_pcl: true
  size: 4

odometry_topic: estimation_manager/odom_main

rate:
  timer_set_ref: 20
  timer_diagnostics: 10

rbl_controller:
  limited_fov: true 
  only_2d: false
  ciri: true
  lidar_tilt: 20.0 # [deg]
  lidar_fov: 59.0 #[deg]
  lidar_tilt: 90.0 # [deg]
  lidar_fov: 180.0 #[deg]
  # limited_fov: true
  # only_2d: false
  # ciri: true
  # lidar_tilt: 0.0 # [deg]
  # lidar_fov: 360.0 #[deg]
  step_size: 0.20
  boundary_threshold: 0.3
  z_min: 0.0
  z_max: 20.0
  z_ref: 1.0
  d1: 1.0
  d2: 1.0
  d3: 1.0
  d4: 1.0
  d5: 1.0
  d6: 1.0
  d7: 1.0
  radius: 5.0 # max planning horizon
  betaD: 0.5
  beta_min: 0.1
  dt: 0.1
  encumbrance: 1.0
  use_z_rule: false
  cwvd_obs: 0.5
  cwvd_rob: 0.5
  use_garmin_alt: false
  replanner: true
  boundary_threshold_speed: 0.01
  move_centroid_to_sensed_cell: false
  pcl:
    downsample: true
    voxel_size: 0.2

replanner:
  inflation_bonus: 0.35

final_positions: # defined with respect to monitored_area_origin

  uav1:
    x: -15.0
    y: 6.0
    z: 5.0

  uav2:
    x: -15.0
    y: 3.0 
    z: 5.0
      
  uav3:
    x: -15.0
    y: 0.0 
    z: 5.0

  uav4:
    x: -15.0
    y: -3.0 
    z: 5.0 

  uav5:
    x: -15.0
    y: -6.0 
    z: 5.0



