  - takeoff:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForControl; ros2 launch mrs_uav_autostart automatic_start.launch.py custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav1; waitForCore && ./takeoff.sh
        - export UAV_NAME=uav2; waitForControl; ros2 launch mrs_uav_autostart automatic_start.launch.py custom_config:=./config/automatic_start.yaml
        - export UAV_NAME=uav2; waitForCore && ./takeoff.sh
        # rosservice call /$UAV_NAME/hw_api/arming 2; sleep 2; call /$UAV_NAME/hw_api/offboard
  - rviz:
      layout: tiled
      panes:
        - ros2 run rviz2 rviz2 -d ./rviz.rviz --ros-args -p use_sim_time:=true
