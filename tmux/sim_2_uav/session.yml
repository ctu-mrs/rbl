# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
startup_window: activation
pre_window: export UAV_NAME=uav1; 
            export RUN_TYPE=simulation; 
            export UAV_TYPE=x500; 
            export BOND=false; 
            export CUSTOM_CONFIG=./config/custom_config.yaml; 
            export WORLD_CONFIG=./config/world_config.yaml; 
            export RMW_IMPLEMENTATION=rmw_zenoh_cpp
            export PLATFORM_CONFIG=`ros2 pkg prefix mrs_multirotor_simulator`/share/mrs_multirotor_simulator/config/mrs_uav_system/$UAV_TYPE.yaml
            # export NETWORK_CONFIG=./config/network_config.yaml; 
            # export PLATFORM_CONFIG=`rospack find mrs_multirotor_simulator`/config/mrs_uav_system/$UAV_TYPE.yaml
windows:
  - router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - simulator:
      layout: tiled
      panes:
        - ros2 launch mrs_multirotor_simulator multirotor_simulator.launch.py custom_config:=./config/simulator.yaml
  - hw_api:
      layout: tiled
      panes:
        -  export UAV_NAME=uav1; ros2 launch mrs_multirotor_simulator hw_api.launch.py
        -  export UAV_NAME=uav2; ros2 launch mrs_multirotor_simulator hw_api.launch.py
  - core:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForHw; ros2 launch mrs_uav_core core.launch.py
          platform_config:=`rospack find mrs_uav_gazebo_simulation`/config/mrs_uav_system/$UAV_TYPE.yaml
          custom_config:=./config/custom_config.yaml
          world_config:=./config/world_config.yaml
          network_config:=./config/network_config.yaml
        - export UAV_NAME=uav2; waitForHw; ros2 launch mrs_uav_core core.launch.py
          platform_config:=`rospack find mrs_uav_gazebo_simulation`/config/mrs_uav_system/$UAV_TYPE.yaml
          custom_config:=./config/custom_config.yaml
          world_config:=./config/world_config.yaml
          network_config:=./config/network_config.yaml
  - activation:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; waitForOffboard; history -s ros2 service call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav2; waitForOffboard; history -s ros2 service call /$UAV_NAME/rbl_controller/activate
        # - export UAV_NAME=uav1; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        # - export UAV_NAME=uav2; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
  - rbl_controller:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTakeoff; ros2 launch rbl_controller_node rbl_controller.launch.py custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav2; waitForTakeoff; ros2 launch rbl_controller_node rbl_controller.launch.py custom_config:=./config/rbl_controller.yaml
        # - export UAV_NAME=uav1; waitForTime; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        # - export UAV_NAME=uav2; waitForTime; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
  - goto:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s rosservice call /uav1/rbl_controller/goto \"goal: \[2.0, 60.0, 2.0, 0.0\]\"'
        - 'history -s rosservice call /uav2/rbl_controller/goto \"goal: \[-2.0, 60.0, 2.0, 0.0\]\"'
  # - goto:
  #     layout: tiled
  #     panes:
  #       - export UAV_NAME=uav1; history -s rosservice call /$UAV_NAME/rbl_controller/goto 
  #       - export UAV_NAME=uav2; history -s rosservice call /$UAV_NAME/rbl_controller/goto
  - filter_ref_uav:
      layout: tiled
      panes: 
        - export UAV_NAME=uav1; waitForCore; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav2; waitForCore; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
