group_odoms:
  enable: true
  add_to_pcl: true
  size: 9

odometry_topic: estimation_manager/odom_main
# odometry_topic: "estimation_manager/ground_truth/odom"

rate:
  timer_set_ref: 10
  timer_diagnostics: 10

rbl_controller:
  limited_fov: true
  only_2d: false
  ciri: true
  lidar_tilt: 20.0 # [deg]
  lidar_fov: 50.0 #[deg]
  # limited_fov: false
  # only_2d: true
  # ciri: false
  # lidar_tilt: 20.0 # [deg]
  # lidar_fov: 360.0 #[deg]
  step_size: 0.2
  boundary_threshold: 2.0
  z_min: 0.0
  z_max: 10.0
  z_ref: 5.0
  d1: 1.5
  d2: 1.5
  d3: 1.5
  d4: 1.5
  d5: 1.5
  d6: 1.5
  d7: 1.5
  radius: 7.0 # max planning horizon
  betaD: 1.0
  beta_min: 0.5
  dt: 0.1
  encumbrance: 0.5
  use_z_rule: false
  cwvd_obs: 0.95
  cwvd_rob: 0.95
  use_garmin_alt: false
  replanner: false
  boundary_threshold_speed: 0.01
  move_centroid_to_sensed_cell: true
  pcl:
    downsample: true
    voxel_size: 0.2

replanner:
  inflation_bonus: 0.2
