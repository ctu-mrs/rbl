mrs_uav_managers:

  estimation_manager:

    # loaded state estimator plugins
    state_estimators: [
      "gps_baro",
      # "gps_garmin",
    ]

    initial_state_estimator: "gps_baro" # will be used as the first state estimator
    agl_height_estimator: ""# only slightly filtered height for checking min height (not used in control feedback)

  uav_manager:

    min_height_checking:
      enabled: false

    max_height_checking:
      enabled: false

  constraint_manager:


    fast:

      horizontal:
        speed: 8.0        # [m/s]
        acceleration: 20.0 # [m/s^2]
        jerk: 1160.0        # [m/s^3]
        snap: 1160.0        # [m/s^4]

      vertical:

        ascending:
          speed: 4.0        # [m/s]
          acceleration: 2.0 # [m/s^2]
          jerk: 60.0        # [m/s^3]
          snap: 60.0        # [m/s^4]

        descending:
          speed: 4.0        # [m/s]
          acceleration: 2.0 # [m/s^2]
          jerk: 60.0        # [m/s^3]
          snap: 60.0        # [m/s^4]

      heading:
        speed: 2.0        # [rad/s]
        acceleration: 2.0 # [rad/s^2]
        jerk: 40.0        # [rad/s^3]
        snap: 40.0        # [rad/s^4]

      angular_speed:
        roll: 60.0  # [rad/s]
        pitch: 60.0 # [rad/s]
        yaw: 10.0   # [rad/s]

      tilt: 80.0 # [deg]
    default_constraints:
      gps_baro: "fast"

  control_manager:

    Se3Controller:
      eland_threshold: 4.0 # [m], position error triggering eland
      failsafe_threshold: 6.0 # [m], position error triggering failsafe land
      odometry_innovation_threshold: 1.5 # [m], position odometry innovation threshold

mrs_uav_trackers:

  mpc_tracker:
    # mrs collision avoidance
    collision_avoidance:

      enabled:           false # disabling this will stop this UAV to react to others, but it will still transmit data to others
      enabled_passively: false # disabling this will stop this uav to even transmit its data to others (only if enabled: false)
      radius: 3.0 # [m]
      correction: 3.0 # [m]
