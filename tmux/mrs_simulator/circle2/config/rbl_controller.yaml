group_odoms:
  enable: true
  add_to_pcl: true

odometry_topic: estimation_manager/odom_main

rate:
  timer_set_ref: 10
  timer_diagnostics: 10

rbl_controller:
  only_2d: true
  z_min: 0.0
  z_max: 10.0
  z_ref: 5.0
  d1: 1.5
  d2: 1.5
  d3: 1.5
  d4: 1.5
  d5: 1.5
  d6: 1.5
  d7: 1.5
  radius: 8.0 # max planning horizon
  betaD: 3.5
  beta_min: 0.20
  dt: 0.1
  step_size: 0.2
  encumbrance: 1.0
  use_z_rule: false
  cwvd_obs: 0.9
  cwvd_rob: 0.9
  use_garmin_alt: false
  replanner: false
  limited_fov: false
  ciri: false
  boundary_threshold: 1.5
  boundary_threshold_speed: 0.0
  lidar_tilt: 20.0 # [deg]
  lidar_fov: 59.0 #[deg]
  move_centroid_to_sensed_cell: true
  pcl:
    downsample: true
    voxel_size: 0.1

replanner:
  inflation_bonus: 0.2
