        - 'history -s rosservice call /uav7/rbl_controller/goto \"goal: \[-12.14, -8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav8/rbl_controller/goto \"goal: \[-4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav9/rbl_controller/goto \"goal: \[4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav10/rbl_controller/goto \"goal: \[12.14, -8.82, 5.00, 0.0\]\"'
  
  - filter_ref_uav:
      layout: tiled
      panes: 
        - export UAV_NAME=uav1; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav2; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav3; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav4; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav5; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav6; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav7; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav8; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav9; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch 
        - export UAV_NAME=uav10; waitForTime; roslaunch filter_reflective_uavs filter_reflective_uavs.launch
  - fake_scan:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTime; roslaunch laserscan_clusters example.launch
        - export UAV_NAME=uav2; waitForTime; roslaunch laserscan_clusters example.launch
        - export UAV_NAME=uav3; waitForTime; roslaunch laserscan_clusters example.launch
