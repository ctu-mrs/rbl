# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
pre_window: export UAV_NAME=uav1; export RUN_TYPE=simulation; export UAV_TYPE=x500; export BOND=false; export CUSTOM_CONFIG=./config/custom_config.yaml; export WORLD_CONFIG=./config/world_config.yaml; export NETWORK_CONFIG=./config/network_config.yaml; export PLATFORM_CONFIG=`rospack find mrs_multirotor_simulator`/config/mrs_uav_system/$UAV_TYPE.yaml
startup_window: activation
windows:
  - roscore:
      layout: tiled
      panes:
        - roscore
  - core:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav2; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav3; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav4; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav5; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav6; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav7; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav8; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav9; waitForTime; roslaunch mrs_uav_core core.launch
        - export UAV_NAME=uav10; waitForTime; roslaunch mrs_uav_core core.launch
  - simulator:
      layout: tiled
      panes:
        - waitForRos; roslaunch mrs_multirotor_simulator multirotor_simulator.launch custom_config:=./config/simulator.yaml
  - hw_api:
      layout: tiled
      panes:
        - waitForTime; export UAV_NAME=uav1; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav2; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav3; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav4; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav5; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav6; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav7; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav8; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav9; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
        - waitForTime; export UAV_NAME=uav10; roslaunch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager
  - activation:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav2; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav3; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav4; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav5; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav6; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav7; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav8; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav9; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
        - export UAV_NAME=uav10; waitForControl; history -s rosservice call /$UAV_NAME/rbl_controller/activate
  - rbl_controller:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav2; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav3; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav4; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav5; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav6; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav7; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav8; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav9; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
        - export UAV_NAME=uav10; waitForControl; roslaunch rbl_controller controller.launch custom_config:=./config/rbl_controller.yaml
  - goto_start:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s rosservice call /uav1/rbl_controller/goto \"goal: \[-15.00, 0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav2/rbl_controller/goto \"goal: \[-12.14, -8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav3/rbl_controller/goto \"goal: \[-4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav4/rbl_controller/goto \"goal: \[4.64, -14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav5/rbl_controller/goto \"goal: \[12.14, -8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav6/rbl_controller/goto \"goal: \[15.00, -0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav7/rbl_controller/goto \"goal: \[12.14, 8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav8/rbl_controller/goto \"goal: \[4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav9/rbl_controller/goto \"goal: \[-4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav10/rbl_controller/goto \"goal: \[-12.14, 8.82, 5.00, 0.0\]\"'

  - goto_finish:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s rosservice call /uav1/rbl_controller/goto \"goal: \[15.00, 0.00, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav2/rbl_controller/goto \"goal: \[12.14, 8.82, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav3/rbl_controller/goto \"goal: \[4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav4/rbl_controller/goto \"goal: \[-4.64, 14.27, 5.00, 0.0\]\"'
        - 'history -s rosservice call /uav5/rbl_controller/goto \"goal: \[-12.14, 8.82, 5.00, 0.0\]\"'
