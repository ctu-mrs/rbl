          config_pcl_filter_rs_down:=../../../mrs_losos_mapping_planning/ros_packages/mrs_losos_mapping_planning/tmux/gazebo_example/config/rs_down_filter.yaml
        - export UAV_NAME=uav3; waitForHw; roslaunch mrs_losos_server losos.launch custom_config:=../../../mrs_losos_mapping_planning/ros_packages/mrs_losos_server/config/default2.yaml world_frame:="$UAV_NAME/world_origin" robot_frame:="$UAV_NAME/fcu"
