        - export UAV_NAME=uav6; waitForTime; roslaunch laserscan_clusters example.launch
        - export UAV_NAME=uav7; waitForTime; roslaunch laserscan_clusters example.launch
        - export UAV_NAME=uav8; waitForTime; roslaunch laserscan_clusters example.launch
        - export UAV_NAME=uav9; waitForTime; roslaunch laserscan_clusters example.launch
        - export UAV_NAME=uav10; waitForTime; roslaunch laserscan_clusters example.launch
