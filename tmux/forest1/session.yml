# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
startup_window: activation
# pre_window: export RUN_TYPE=simulation; export UAV_TYPE=x500; export BOND=false; export CUSTOM_CONFIG=./config/custom_config.yaml; export WORLD_CONFIG=./config/world_config.yaml; export NETWORK_CONFIG=./config/network_config.yaml; export PLATFORM_CONFIG=`rospack find mrs_multirotor_simulator`/config/mrs_uav_system/$UAV_TYPE.yaml

pre_window: 
  - export UAV_NAME=uav1
  - export USE_SIM_TIME="true"
  - export RUN_TYPE=simulation 
  - export UAV_TYPE=x500
  - export CUSTOM_CONFIG=./config/custom_config.yaml 
  - export WORLD_CONFIG=./config/world_config.yaml 
  - export WORLD_FILE=`ros2 pkg prefix mrs_gazebo_common_resources`/share/mrs_gazebo_common_resources/worlds/forest.sdf
  # - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
  - export PLATFORM_CONFIG=`ros2 pkg prefix mrs_uav_gazebo_simulator`/share/mrs_uav_gazebo_simulator/config/mrs_uav_system/$UAV_TYPE.yaml
  - export MAP_LENGTH=28.0; export MAP_WIDTH=25.0; export MAP_HEIGHT=10.0; export MAP_OBS_NUM=20; export MAP_CIRCLE_NUM=0


windows:
  - router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - core:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_core core.launch.py
          platform_config:=$PLATFORM_CONFIG
          custom_config:=./config/custom_config.yaml
          world_config:=./config/world_config.yaml
          network_config:=./config/network_config.yaml
  - status:
      layout: tiled
      panes:
        - ros2 run mrs_uav_status status.sh
  - activation:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; waitForOffboard; history -s ros2 service call /uav1/rbl_controller/activation std_srvs/srv/Trigger
  - rbl_controller:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; waitForTakeoff; ros2 launch rbl_controller_node rbl_controller.launch.py custom_config:=./config/rbl_controller.yaml
  - goto:
      layout: tiled
      synchronize: after
      panes:
        - 'history -s ros2 service call /uav1/rbl_controller/goto mrs_msgs/srv/Vec4 "{goal: [2.0, 60.0, 2.0, 0.0]}"'
  - filter_reflective_uavs:
      layout: tiled
      synchronize: after
      panes:
        - export UAV_NAME=uav1; ros2 launch filter_reflective_uavs filter_reflective_uavs.launch.py uav_name:=$UAV_NAME global_frame:=$UAV_NAME/world_origin custom_config:=./config/filter_reflective_uavs.yaml

  - simulator:
      layout: tiled
      panes:
        - ros2 launch mrs_multirotor_simulator multirotor_simulator.launch.py custom_config:=./config/simulator.yaml

  - takeoff:
      layout: tiled
      panes:
        - ros2 launch mrs_uav_autostart automatic_start.launch.py custom_config:=./config/automatic_start.yaml
        - waitForCore && ./takeoff.sh
  - hw_api:
      layout: tiled
      panes:
        - ros2 launch mrs_multirotor_simulator hw_api.launch.py
  # - hw_api:
  #     layout: tiled
  #     panes:
  #       - export UAV_NAME=uav1; ros2 launch mrs_multirotor_simulator hw_api.launch custom_config:=./config/hw_api.yaml nodelet_manager_name:=$UAV_NAME\_nodelet_manager

  - automatic_start:
      layout: tiled
      panes:
        - export UAV_NAME=uav1; ros2 launch mrs_uav_autostart automatic_start.launch custom_config:=./config/automatic_start.yaml

  # - tf_connector:
